name: CI Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Go
        run: cd backend && CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -ldflags="-s -w" -o ../kernelsu/bin/jd-cookie .

      - name: Build WebUI
        run: cd frontend && npm ci && npm run build

      - name: Package
        run: cd kernelsu && zip -r ../jd_assistant.zip .

      - name: Checksum
        run: sha256sum jd_assistant.zip > jd_assistant.zip.sha256

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: jd-assistant-${{ github.sha }}
          path: |
            jd_assistant.zip
            jd_assistant.zip.sha256
